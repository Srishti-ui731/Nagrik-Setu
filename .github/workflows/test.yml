name: Test Suite CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run code formatter check
        run: npx prettier --check "src/**/*.{ts,tsx}" "server.ts" "*.json"

      - name: Run TypeScript validation checks
        run: npm run lint

      - name: Run automated test suite
        run: npm run test
